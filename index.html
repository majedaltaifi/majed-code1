function markCompleted(id){document.getElementById(id).classList.add('completed')}
function unmarkCompleted(id){document.getElementById(id).classList.remove('completed')}

function updateProgress(){
  let done=0,total=5;
  if(selectedEnv)done++;
  if(selectedType)done++;
  if(document.getElementById('f-desc').value.trim().length>=3)done++;
  done++; // files optional
  if(selectedSeverity)done++;
  const pct=(done/total)*100;
  document.getElementById('prog-bar').style.width=pct+'%';
  // Always enable — button validates on click and shows helpful errors
  document.getElementById('submit-btn').disabled=false;
}

function handleDrop(e){
  e.preventDefault();
  document.getElementById('upload-zone').classList.remove('dragover');
  handleFiles(e.dataTransfer.files);
}
function handleFiles(fl){
  for(const f of fl){if(f.size>10*1024*1024||uploadedFiles.length>=10)continue;uploadedFiles.push(f)}
  renderPrev();
  if(uploadedFiles.length)markCompleted('sec-files');
}
function renderPrev(){
  document.getElementById('file-previews').innerHTML=uploadedFiles.map((f,i)=>{
    if(f.type.startsWith('image/')){
      const u=URL.createObjectURL(f);
      return`<div class="file-thumb"><img src="${u}"><button class="remove-file" onclick="rmFile(${i})">✕</button></div>`
    }
    return`<div class="file-thumb"><div class="file-ext">${f.name.split('.').pop().toUpperCase()}</div><button class="remove-file" onclick="rmFile(${i})">✕</button></div>`
  }).join('');
}
function rmFile(i){uploadedFiles.splice(i,1);renderPrev();if(!uploadedFiles.length)unmarkCompleted('sec-files')}

async function submitReport(){
  const t=T[lang],en=T.en;
  if(!selectedEnv){toast(t.envLabel||en.envLabel);scrollToSec('sec-env');return}
  if(!selectedType){toast(t.errType||en.errType);scrollToSec('sec-type');return}
  const descEl=document.getElementById('f-desc');
  if(descEl.value.trim().length<3){descEl.classList.add('field-error');descEl.focus();toast(t.errDesc||en.errDesc);scrollToSec('sec-desc');return}
  if(!selectedSeverity){toast(t.severityLabel||en.severityLabel);scrollToSec('sec-sev');return}
  
  const btn = event.target.closest('button');
  const orig = btn.innerHTML;
  btn.disabled = true; btn.innerHTML = '...';

  const ref=genRef();
  const nowIso=new Date().toISOString();
  const rpt={
    ref,type:selectedType,category:selectedType,env:selectedEnv,
    subIssue:selectedSubIssue,detail:selectedDetail,frequency:selectedFrequency||null,
    desc:descEl.value,
    location:document.getElementById('f-location').value,
    date:document.getElementById('f-date').value,
    time:document.getElementById('f-time').value,
    ongoing:isOngoing,severity:selectedSeverity,anon:isAnonymous,
    email:isAnonymous?null:document.getElementById('f-email').value,
    phone:isAnonymous?null:document.getElementById('f-phone').value,
    files:uploadedFiles.length,
    at:nowIso,lang,
    status:'open',
    timeline:[{text:'tlReceived',by:'tlBySystem',color:'#00e676',at:nowIso}]
  };

  try {
    await db.collection('reports').doc(ref).set(rpt);
    const rpts=loadReports(); rpts.push(rpt); saveReports(rpts);
    document.getElementById('ref-number').textContent=ref;
    document.getElementById('next-steps').innerHTML=(T[lang].nextSteps||T.en.nextSteps).map(s=>`<li>${s}</li>`).join('');
    closeSheet('sheet-form');
    setTimeout(()=>{openSheet('sheet-confirm');confetti();if(navigator.vibrate)navigator.vibrate([50,100,50])},350);
    addNotif(t.notifReportReceived||en.notifReportReceived,ref,'report');
    updateStats();
  } catch(e) {
    alert("Error: " + e.message);
  } finally {
    btn.disabled = false; btn.innerHTML = orig;
  }
}

function syncBroadcasts() {
  db.collection('broadcasts').onSnapshot(snap => {
    const row = document.getElementById('broadcasts-row');
    const wrap = document.getElementById('broadcasts-wrap');
    if(!row || !wrap) return;
    const list = snap.docs.map(d => d.data()).filter(b => b.title && b.title.trim() !== '');
    
    if(list.length === 0) { wrap.style.display = 'none'; return; }
    wrap.style.display = 'block';
    
    row.innerHTML = list.map(b => `
      <div class="bc-item">
        <div class="bc-item-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:22px; height:22px;">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
          </svg>
        </div>
        <div class="bc-item-body">
          <div class="bc-item-label">${lang === 'ar' ? 'تنبيه نظام' : 'SYSTEM ALERT'}</div>
          <div class="bc-item-title">${b.title}</div>
          <div style="font-size:0.75rem; color:rgba(240,242,255,0.45); margin-top:2px; line-height:1.4;">${b.content || ''}</div>
        </div>
      </div>
    `).join('');
  });
}

function scrollToSec(id){

function genRef(){
  const n=new Date(),y=n.getFullYear().toString().slice(-2),m=String(n.getMonth()+1).padStart(2,'0'),d=String(n.getDate()).padStart(2,'0');
  return`NIT-${y}${m}${d}-${Math.floor(1000+Math.random()*9000)}`
}

      :'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>';

function updateCTAText(){
  const labels={ar:'لتحميل التطبيق اضغط هنا',en:'Tap here to install the app',ur:'ایپ ڈاؤنلوڈ کریں',hi:'ऐप इंस्टॉल करें',tl:'I-install dito',sw:'Sakinisha hapa',tr:'Uygulamayı yükleyin',id:'Instal aplikasi'};
  const subs={ar:'يعمل بدون إنترنت',en:'Works offline',ur:'آف لائن',hi:'ऑफ़लाइन',tl:'Offline',sw:'Offline',tr:'Çevrimdışı',id:'Offline'};

  const g=isIOS?ig.ios:ig.android;
  const svgShare='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>';
  const svgMenu='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1.5" fill="currentColor"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/><circle cx="12" cy="19" r="1.5" fill="currentColor"/></svg>';
  const svgHome='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="4"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>';
  const svgCheck='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg>';

/* ══════════════════════════════════════════
   CONFETTI + TOAST
   ══════════════════════════════════════════ */
function confetti(){
  const c=document.getElementById('confetti');c.innerHTML='';
  const cols=['#80d1e9','#2e3192','#00e676','#ffab00','#fff'];
  for(let i=0;i<50;i++){
    const p=document.createElement('div');p.className='confetti';
    p.style.left=Math.random()*100+'%';
    p.style.background=cols[Math.floor(Math.random()*cols.length)];
    p.style.width=(Math.random()*6+4)+'px';p.style.height=p.style.width;
    p.style.borderRadius=Math.random()>.5?'50%':'2px';
    p.style.animationDuration=(Math.random()*2+2)+'s';
    p.style.animationDelay=Math.random()*1.5+'s';
    c.appendChild(p)
  }
  setTimeout(()=>c.innerHTML='',5000)
}
let toastTimer;
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2400);
}

/* ══════════════════════════════════════════
   AUTO-UPDATE: detect new SW version and reload
   ══════════════════════════════════════════ */
const APP_VERSION='2.1';
let __refreshing=false;
function showUpdateBanner(msg){
  const b=document.getElementById('update-banner');
  if(msg)document.getElementById('update-msg').textContent=msg;
  b.classList.add('show');
}
function hideUpdateBanner(){document.getElementById('update-banner').classList.remove('show')}

if('serviceWorker' in navigator){
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(__refreshing)return;__refreshing=true;
    showUpdateBanner('جاري التحديث...');
    setTimeout(()=>window.location.reload(),400);
  });
  navigator.serviceWorker.register('sw.js').then(reg=>{
    // check for updates on load
    reg.update().catch(()=>{});
    // re-check periodically + on visibility
    setInterval(()=>reg.update().catch(()=>{}),60*1000);
    document.addEventListener('visibilitychange',()=>{if(!document.hidden)reg.update().catch(()=>{})});
    reg.addEventListener('updatefound',()=>{
      const nw=reg.installing;if(!nw)return;
      nw.addEventListener('statechange',()=>{
        if(nw.state==='installed'&&navigator.serviceWorker.controller){
          // new version waiting — tell it to activate immediately
          showUpdateBanner('تحديث جديد...');
          nw.postMessage({type:'SKIP_WAITING'});
        }
      });
    });
  }).catch(()=>{});
}

  }else{
