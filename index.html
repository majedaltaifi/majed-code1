function renderStatsDashboard(){
  const wrap=document.getElementById('stats-dashboard');
  if(!wrap)return;
  const reports=loadReports();
  if(!reports.length){wrap.innerHTML='';return}
  const t=T[lang],en=T.en;
  // Count by category
  const cats={Safety:0,Service:0,Violation:0};
  const sevs={low:0,medium:0,high:0,critical:0};
  const statuses={pending:0,review:0,done:0};
  reports.forEach(r=>{
    if(cats[r.type]!=null)cats[r.type]++;
    if(sevs[r.severity]!=null)sevs[r.severity]++;
    const st=getReportStatus(r).cls;if(statuses[st]!=null)statuses[st]++;
  });
  const max=(o)=>Math.max(1,...Object.values(o));
  const bar=(label,val,total,color)=>`<div class="sd-bar-row"><div class="sd-bar-label">${label}</div><div class="sd-bar-track"><div class="sd-bar-fill" style="width:${(val/total)*100}%;background:linear-gradient(90deg,${color},color-mix(in srgb,${color} 60%,var(--turquoise)))"></div></div><div class="sd-bar-count">${val}</div></div>`;
  const catTot=Math.max(1,cats.Safety+cats.Service+cats.Violation);
  const sevTot=max(sevs);
  wrap.innerHTML=`<div class="stats-dash">
    <div class="sd-card">
      <div class="sd-title">${t.catLabel||en.catLabel}</div>
      <div class="sd-bars">
        ${bar(t.catSafety||en.catSafety,cats.Safety,catTot,'#fbbf24')}
        ${bar(t.catService||en.catService,cats.Service,catTot,'#80d1e9')}
        ${bar(t.catViolation||en.catViolation,cats.Violation,catTot,'#f87171')}
      </div>
    </div>
    <div class="sd-card">
      <div class="sd-title">${t.severityLabel||en.severityLabel}</div>
      <div class="sd-bars">
        ${bar(t.severity[0].label,sevs.low,sevTot,'#4ade80')}
        ${bar(t.severity[1].label,sevs.medium,sevTot,'#fbbf24')}
        ${bar(t.severity[2].label,sevs.high,sevTot,'#fb923c')}
        ${bar(t.severity[3].label,sevs.critical,sevTot,'#f87171')}
      </div>
    </div>
  </div>`;
}

/* ══════════════════════════════════════════
   QR CODE (minimal generator, no library)
   Based on public domain implementation — supports alpha-numeric up to ~60 chars
   ══════════════════════════════════════════ */
function qrSvg(text,size){
  // Tiny QR implementation using model 2, version 2, error correction L
  // For this app we use a simpler approach: a QR chart service? No — must work offline.
  // Implement basic QR via kazuhikoarase library inline (minified below)
  try{const qr=qrcode(0,'L');qr.addData(text);qr.make();return qr.createSvgTag({cellSize:6,margin:2,scalable:true})}
  catch(e){return '<div style="padding:20px;color:#333">QR unavailable</div>'}
}

function switchTab(tab){
  if(currentTab===tab)return;
  currentTab=tab;
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  const pane=document.getElementById('tab-'+tab);
  if(!pane) return;
  pane.offsetHeight;
  pane.classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  
  const mainApp = document.getElementById('main-app');
  if (mainApp) mainApp.classList.toggle('tab-more-active', tab === 'more');

  updateHeader();
  if(tab==='reports')renderReports();

  if(tab==='home'){updateStats();applyPersonalization();renderStatsDashboard()}
  if(tab==='more'){renderProfileCard();updateLogoutBtn()}
  const content = document.querySelector('.tab-content');
  if(content) content.scrollTop = 0;
  if(navigator.vibrate)navigator.vibrate(8);
}

        <div class="mt-step ${stage0}">
          <div class="mt-dot done">${check}</div>
          <div class="mt-label">${t.trackLogged||en.trackLogged}</div>
        </div>
        <div class="mt-line ${line1}"></div>

function animateCount(id,target){
  const el=document.getElementById(id);if(!el)return;
  const start=parseInt(el.textContent)||0;
  if(start===target){el.textContent=target;return}
  const dur=600,t0=performance.now();
  function step(now){
    const p=Math.min((now-t0)/dur,1);
    const eased=1-Math.pow(1-p,3);
    el.textContent=Math.round(start+(target-start)*eased);
    if(p<1)requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function getReportStatus(r){
  if(!r) return {cls:'pending',label:T[lang].statusPending};
  const s = String(r.status || 'OPEN').toUpperCase();
  const at = r.at || r.created_at || new Date().toISOString();
  const hrs=(Date.now()-new Date(at).getTime())/3600000;
  
  if(s==='DONE'||s==='CLOSED'||hrs>120) return {cls:'done',label:T[lang].statusDone};
  if(s==='REVIEW'||s==='IN PROG'||hrs>48) return {cls:'review',label:T[lang].statusReview};
  return {cls:'pending',label:T[lang].statusPending};
}

function formatRelativeTime(d){
  const diff=(Date.now()-d.getTime())/1000;
  if(diff<60)return 'now';
  if(diff<3600)return Math.floor(diff/60)+'m';
  if(diff<86400)return Math.floor(diff/3600)+'h';
  if(diff<604800)return Math.floor(diff/86400)+'d';
  return d.toLocaleDateString(undefined,{month:'short',day:'numeric'});
}

function escapeHtml(s){return(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

let searchDebounce = null;
async function handleChatSearch(q) {
  const overlay = document.getElementById('search-results');
  const val = q.trim();
  if (val.length < 1) { overlay.style.display = 'none'; return; }

  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(async () => {
    overlay.innerHTML = '<div style="padding:20px;text-align:center;opacity:0.5">Searching...</div>';
    overlay.style.display = 'block';

    try {
      // Direct doc fetch by employeeId
      const doc = await db.collection('employees').doc(val).get();
      if (doc.exists) {
        const u = doc.data();
        const name = u.name || u['Employee Name - English'] || 'User';
        overlay.innerHTML = `
          <div class="search-item" onclick="document.getElementById('search-results').style.display='none'; openChatWithPersonal('${doc.id}', '${name}')">
            <div class="search-avatar">${name.charAt(0).toUpperCase()}</div>
            <div class="search-info">
              <div class="search-name">${name}</div>
              <div class="search-meta">ID: ${doc.id}</div>
            </div>
          </div>
        `;
      } else {
        overlay.innerHTML = '<div style="padding:20px;text-align:center;opacity:0.5">No employee found.</div>';
      }
    } catch(e) {
      console.error("Search error:", e);
      overlay.innerHTML = '<div style="padding:20px;text-align:center;color:var(--danger)">Service unavailable.</div>';
    }
  }, 400);
}

// ─── CHAT ENGINE ─────────────────────────

let activeChatId = null;
let activeChatName = 'Support';

function openChatWith(id, name) {
  activeChatId = id;
  activeChatName = name;
  const overlay = document.getElementById('screen-chat');
  if (overlay) overlay.classList.add('active');
  const titleEl = overlay.querySelector('.sheet-title');
  if (titleEl) titleEl.textContent = name;
  
  // Mark as read when opening
  const user = currentUser || loadUser();
  if (user) {
    const myId = String(user.empNo || user.employeeId);
    db.collection('chats').doc(id).set({
      unread: { [myId]: false }
    }, { merge: true }).catch(e => console.error("Mark read error:", e));
  }
  
  initChatSystem();
}

function openChatWithPersonal(otherId, otherName) {
  const user = currentUser || loadUser();
  if (!user) return;
  const myId = String(user.empNo || user.employeeId);
  const chatId = [myId, String(otherId)].sort().join('_');
  
  // Initialize the chat document to track members
  db.collection('chats').doc(chatId).set({
    members: [myId, String(otherId)],
    memberNames: {
      [myId]: user.name,
      [otherId]: otherName
    },
    last_at: firebase.firestore.FieldValue.serverTimestamp()
  }, { merge: true });
  
  openChatWith(chatId, otherName);
}

function openChatScreen() {
  const user = currentUser || loadUser();
  if (!user) return;
  const myId = String(user.empNo || user.employeeId);
  openChatWith(`${myId}_Support`, 'Support');
}

function closeChatScreen() {
  const el = document.getElementById('screen-chat');
  if(el) el.classList.remove('active');
  if (chatUnsub) { chatUnsub(); chatUnsub = null; }
  activeChatId = null;
}

let chatUnsub = null;
function initChatSystem() {
  if (!activeChatId) return;
  const user = currentUser || loadUser();
  if (!user) return;
  if (chatUnsub) chatUnsub();

  const myId = String(user.empNo || user.employeeId);
  chatUnsub = db.collection('chats').doc(activeChatId).collection('messages')
    .orderBy('timestamp', 'asc')
    .onSnapshot(snap => {
      const msgsDiv = document.getElementById('chat-msgs');
      if (!msgsDiv) return;
      
      const msgs = [];
      snap.forEach(doc => msgs.push(doc.data()));

      const fragment = document.createDocumentFragment();
      msgs.forEach(m => {
        const isMe = String(m.senderId) === String(myId);
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${isMe ? 'me' : 'them'}`;
        
        const nameDiv = document.createElement('div');
        nameDiv.style.fontSize = '0.7rem';
        nameDiv.style.opacity = '0.7';
        nameDiv.style.marginBottom = '2px';
        nameDiv.textContent = m.senderName || (isMe ? 'You' : activeChatName);
        
        const textDiv = document.createElement('div');
        textDiv.textContent = m.text;
        
        msgDiv.appendChild(nameDiv);
        msgDiv.appendChild(textDiv);
        fragment.appendChild(msgDiv);
      });
      
      msgsDiv.innerHTML = '';
      msgsDiv.appendChild(fragment);
      msgsDiv.scrollTop = msgsDiv.scrollHeight;
    }, err => {
      console.error("Chat sync error:", err);
    });
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  if (!input || !input.value.trim() || !activeChatId) return;
  
  const user = currentUser || loadUser();
  if (!user) { alert("Session error. Please login again."); return; }
  
  const myId = String(user.empNo || user.employeeId);
  const text = input.value.trim();
  input.value = '';

  const msg = {
    text,
    senderId: myId,
    senderName: user.name,
    timestamp: firebase.firestore.FieldValue.serverTimestamp()
  };

  try {
    await db.collection('chats').doc(activeChatId).collection('messages').add(msg);
    // Update parent doc: set unread for OTHER members
    const otherId = activeChatId.split('_').find(id => id !== myId && id !== 'Support');
    const updateData = {
      last_at: firebase.firestore.FieldValue.serverTimestamp(),
      last_msg: text,
      last_sender_id: myId,
      unread: {}
    };
    if (otherId) {
      updateData.unread[otherId] = true;
    } else if (activeChatId.includes('Support')) {
      updateData.unread['admin'] = true;
    }
    
    await db.collection('chats').doc(activeChatId).set(updateData, { merge: true });
  } catch(e) {
    console.error("Send error:", e);
    alert("Fail to send: " + e.message);
  }
}

function openForm(){

function resetForm(){

function buildSevOpts(){

function buildLocOpts(){

function setDefaultLocation(){
  const s=document.getElementById('f-location');if(!s||!currentUser||!currentUser.site)return;
  const site=currentUser.site.trim().toLowerCase(); if(!site)return;
  for(let i=1;i<s.options.length;i++){
    const opt=s.options[i].text.toLowerCase();
    if(opt.includes(site)||site.includes(opt.split(' ')[0].toLowerCase())){
      s.selectedIndex=i; break;
    }
  }
}

function selSev(id,el){

function togSwitch(el,kind){
  el.classList.toggle('on');
  if(kind==='ongoing')isOngoing=el.classList.contains('on');
}
function togAnon(el){
  el.classList.toggle('on');
  isAnonymous=el.classList.contains('on');

  if(cf) cf.classList.toggle('show',!isAnonymous);
  
  // Auto-populate defaults if NOT anonymous
  if(!isAnonymous && currentUser){
    const emailField = document.getElementById('f-email');

function onDescInput(el){
  document.getElementById('cc').textContent=el.value.length;

  else{unmarkCompleted('sec-desc')}

function markCompleted(id){document.getElementById(id).classList.add('completed')}
function unmarkCompleted(id){document.getElementById(id).classList.remove('completed')}

function updateProgress(){
  let done=0,total=5;
  if(selectedEnv)done++;
  if(selectedType)done++;
  if(document.getElementById('f-desc').value.trim().length>=3)done++;
  done++; // files optional
  if(selectedSeverity)done++;
  const pct=(done/total)*100;
  document.getElementById('prog-bar').style.width=pct+'%';
  // Always enable — button validates on click and shows helpful errors
  document.getElementById('submit-btn').disabled=false;
}

function handleDrop(e){
  e.preventDefault();
  document.getElementById('upload-zone').classList.remove('dragover');
  handleFiles(e.dataTransfer.files);
}
function handleFiles(fl){
  for(const f of fl){if(f.size>10*1024*1024||uploadedFiles.length>=10)continue;uploadedFiles.push(f)}
  renderPrev();
  if(uploadedFiles.length)markCompleted('sec-files');
}
function renderPrev(){
  document.getElementById('file-previews').innerHTML=uploadedFiles.map((f,i)=>{
    if(f.type.startsWith('image/')){
      const u=URL.createObjectURL(f);
      return`<div class="file-thumb"><img src="${u}"><button class="remove-file" onclick="rmFile(${i})">✕</button></div>`
    }
    return`<div class="file-thumb"><div class="file-ext">${f.name.split('.').pop().toUpperCase()}</div><button class="remove-file" onclick="rmFile(${i})">✕</button></div>`
  }).join('');
}
function rmFile(i){uploadedFiles.splice(i,1);renderPrev();if(!uploadedFiles.length)unmarkCompleted('sec-files')}

async function submitReport(){
  const t=T[lang],en=T.en;
  if(!selectedEnv){toast(t.envLabel||en.envLabel);scrollToSec('sec-env');return}
  if(!selectedType){toast(t.errType||en.errType);scrollToSec('sec-type');return}
  const descEl=document.getElementById('f-desc');
  if(descEl.value.trim().length<3){descEl.classList.add('field-error');descEl.focus();toast(t.errDesc||en.errDesc);scrollToSec('sec-desc');return}
  if(!selectedSeverity){toast(t.severityLabel||en.severityLabel);scrollToSec('sec-sev');return}
  
  const btn = event.target.closest('button');
  const orig = btn.innerHTML;
  btn.disabled = true; btn.innerHTML = '...';

  // Process Images to Base64
  const imageDatas = [];
  try {
      for(const file of uploadedFiles) {
          if(file.type.startsWith('image/')) {
              const b64 = await toBase64(file);
              // Simple compression by limiting size if needed, but for now just send
              imageDatas.push(b64);
          }
      }
  } catch(e) { console.error("Image processing failed", e); }

  const ref=genRef();
  const nowIso=new Date().toISOString();
  const now = firebase.firestore.Timestamp.now();

  const rpt={
    ref,
    type:selectedType,
    category:selectedType,
    env:selectedEnv,
    subIssue:selectedSubIssue,
    detail:selectedDetail,
    frequency:selectedFrequency||null,
    desc:descEl.value,
    location:document.getElementById('f-location').value || (currentUser ? currentUser.site : 'Unknown'),
    site: (currentUser ? (currentUser.site || currentUser.project) : document.getElementById('f-location').value) || 'Unknown',
    project: String(currentUser ? (currentUser.project || '') : ''),
    dept: String(currentUser ? (currentUser.dept || '') : ''),
    emp_no: String(currentUser ? (currentUser.empNo || '') : ''),
    emp_name: (currentUser && !isAnonymous) ? currentUser.name : (isAnonymous ? 'Anonymous' : 'Guest'),
    imageDatas: imageDatas,
    date:document.getElementById('f-date').value,
    time:document.getElementById('f-time').value,
    ongoing:isOngoing,
    severity:selectedSeverity,
    priority:selectedSeverity.charAt(0).toUpperCase() + selectedSeverity.slice(1), 
    anon:isAnonymous,
    email:isAnonymous?null:(document.getElementById('f-email').value || (currentUser?currentUser.email:'')),
    phone:isAnonymous?null:(document.getElementById('f-phone').value || (currentUser?currentUser.phone:'')),
    files:uploadedFiles.length,
    at:nowIso,
    created_at: now, 
    lang,
    status:'OPEN', 
    timeline:[{text:'tlReceived',by:'tlBySystem',color:'#00e676',at:nowIso}]
  };

  try {
    await db.collection('reports').doc(ref).set(rpt);
    const rpts=loadReports(); rpts.push(rpt); saveReports(rpts);
    document.getElementById('ref-number').textContent=ref;
    document.getElementById('next-steps').innerHTML=(T[lang].nextSteps||T.en.nextSteps).map(s=>`<li>${s}</li>`).join('');
    closeSheet('sheet-form');
    setTimeout(()=>{openSheet('sheet-confirm');confetti();if(navigator.vibrate)navigator.vibrate([50,100,50])},350);
    addNotif(t.notifReportReceived||en.notifReportReceived,ref,'report');
    updateStats();
  } catch(e) {
    alert("Error: " + e.message);
  } finally {
    btn.disabled = false; btn.innerHTML = orig;
  }
}

function closeConfirm(){
  closeSheet('sheet-confirm');
  switchTab('reports');
  renderReports();
}


function scrollToSec(id){
  const el=document.getElementById(id);
  document.getElementById('form-body').scrollTo({top:el.offsetTop-70,behavior:'smooth'});
}

function genRef(){
  const n=new Date(),y=n.getFullYear().toString().slice(-2),m=String(n.getMonth()+1).padStart(2,'0'),d=String(n.getDate()).padStart(2,'0');
  return`NIT-${y}${m}${d}-${Math.floor(1000+Math.random()*9000)}`
}

function openSheet(id){
  const s=document.getElementById(id);if(!s)return;
  s.style.display='flex';
  requestAnimationFrame(()=>{
    s.classList.add('show');
    s.classList.add('open');
  });
  document.body.style.overflow='hidden';
}
function closeSheet(id){
  const s=document.getElementById(id);if(!s)return;
  s.classList.remove('open');
  s.classList.remove('show');
  setTimeout(()=>s.style.display='none',400);
  if(!document.querySelector('.sheet.open')) document.body.style.overflow='';
}

function initCTA(){

      :'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>';

function updateCTAText(){
  const labels={ar:'لتحميل التطبيق اضغط هنا',en:'Tap here to install the app',ur:'ایپ ڈاؤنلوڈ کریں',hi:'ऐप इंस्टॉल करें',tl:'I-install dito',sw:'Sakinisha hapa',tr:'Uygulamayı yükleyin',id:'Instal aplikasi'};
  const subs={ar:'يعمل بدون إنترنت',en:'Works offline',ur:'آف لائن',hi:'ऑफ़लाइन',tl:'Offline',sw:'Offline',tr:'Çevrimdışı',id:'Offline'};

}

function handleInstallClick(){
  if(deferredPrompt){
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(c=>{deferredPrompt=null;if(c.outcome==='accepted')document.getElementById('install-cta').classList.remove('visible')});
    return
  }
  showInstallGuide();
}
function showInstallGuide(){
  const isIOS=/iPad|iPhone|iPod/.test(ua);
  const ig=installGuideT[lang]||installGuideT.en;
  const g=isIOS?ig.ios:ig.android;
  const svgShare='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>';
  const svgMenu='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1.5" fill="currentColor"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/><circle cx="12" cy="19" r="1.5" fill="currentColor"/></svg>';
  const svgHome='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="4"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>';
  const svgCheck='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg>';
  const icons=isIOS?[svgShare,svgHome,svgCheck]:[svgMenu,svgHome,svgCheck];

  document.getElementById('modal-desc').textContent=g.d;
  document.getElementById('modal-got-it').textContent=g.btn;

    const connector=i<g.steps.length-1?'<div class="step-connector">▼</div>':'';

function confetti(){
  const c=document.getElementById('confetti');c.innerHTML='';
  const cols=['#80d1e9','#2e3192','#00e676','#ffab00','#fff'];
  for(let i=0;i<50;i++){
    const p=document.createElement('div');p.className='confetti';
    p.style.left=Math.random()*100+'%';
    p.style.background=cols[Math.floor(Math.random()*cols.length)];
    p.style.width=(Math.random()*6+4)+'px';p.style.height=p.style.width;
    p.style.borderRadius=Math.random()>.5?'50%':'2px';
    p.style.animationDuration=(Math.random()*2+2)+'s';
    p.style.animationDelay=Math.random()*1.5+'s';
    c.appendChild(p)
  }
  setTimeout(()=>c.innerHTML='',5000)
}
let toastTimer;
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2400);
}
