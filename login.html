<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIT Command | Private Terminal Access</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --nit-blue: #2e3192; --nit-dark: #1a1c5e; --nit-deep: #0d0e3d;
            --turquoise: #80d1e9; --turq-glow: rgba(128, 209, 233, 0.25);
            --bg: #05061b; --bg2: #0d0e3d; --surface: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.1); --border-glow: rgba(128, 209, 233, 0.4);
            --text: #f0f2ff; --text-dim: rgba(240, 242, 255, 0.7); --danger: #ff5252;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { 
            background: linear-gradient(160deg, var(--bg) 0%, var(--bg2) 55%, var(--nit-dark) 100%);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .bg-layer { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
        .bg-orb { position: absolute; border-radius: 50%; filter: blur(140px); opacity: 0.15; animation: orbFloat 20s infinite alternate ease-in-out; }
        .bg-orb-1 { width: 600px; height: 600px; background: var(--turquoise); top: -200px; right: -100px; }
        .bg-orb-2 { width: 450px; height: 450px; background: #6366f1; bottom: -100px; left: -50px; animation-delay: -5s; }
        @keyframes orbFloat { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(60px, 30px) scale(1.1); } }

        .login-container { width: 100%; max-width: 450px; padding: 20px; animation: fadeUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) both; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .logo-area { text-align: center; margin-bottom: 40px; }
        .logo-img { width: 180px; filter: brightness(0) invert(1); margin-bottom: 10px; }
        .logo-tag { font-size: 11px; font-weight: 900; color: var(--turquoise); letter-spacing: 6px; text-transform: uppercase; }

        .login-card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(40px); 
            border: 1px solid var(--border); 
            border-radius: 40px; 
            padding: 50px 40px; 
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }
        .login-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, var(--turquoise), transparent);
            opacity: 0.5;
        }

        .login-title { font-size: 2.2rem; font-weight: 950; text-align: center; margin-bottom: 8px; letter-spacing: -1px; }
        .login-subtitle { font-size: 0.95rem; color: var(--text-dim); text-align: center; margin-bottom: 35px; font-weight: 500; }

        .input-group { position: relative; margin-bottom: 20px; }
        .input-icon { position: absolute; left: 22px; top: 19px; color: var(--text-dim); font-size: 1.1rem; transition: 0.3s; }
        .login-input { 
            width: 100%; 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid var(--border); 
            border-radius: 20px; 
            padding: 18px 25px 18px 55px; 
            color: #fff; 
            font-size: 1rem; 
            font-weight: 600; 
            outline: none; 
            transition: 0.4s; 
        }
        .login-input:focus { 
            border-color: var(--turquoise); 
            background: rgba(255, 255, 255, 0.08); 
            box-shadow: 0 0 25px var(--turq-glow); 
        }
        .login-input:focus + .input-icon { color: var(--turquoise); }

        .login-btn { 
            width: 100%; 
            background: linear-gradient(135deg, var(--turquoise), var(--nit-blue)); 
            color: #fff; 
            border: none; 
            padding: 20px; 
            border-radius: 22px; 
            font-weight: 900; 
            font-size: 1.1rem; 
            cursor: pointer; 
            transition: 0.4s; 
            margin-top: 15px; 
            box-shadow: 0 15px 35px rgba(46, 49, 146, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .login-btn:hover { transform: translateY(-3px); box-shadow: 0 20px 45px rgba(46, 49, 146, 0.4); }
        .login-btn:active { transform: scale(0.98); }
        .login-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        #login-error { 
            background: rgba(255, 82, 82, 0.1); 
            border: 1px solid rgba(255, 82, 82, 0.2); 
            color: var(--danger); 
            padding: 15px; 
            border-radius: 15px; 
            font-size: 0.85rem; 
            font-weight: 700; 
            text-align: center; 
            margin-bottom: 20px; 
            display: none; 
            animation: shake 0.4s; 
        }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        .spinner { width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .footer-note { text-align: center; margin-top: 30px; font-size: 0.8rem; color: var(--text-dim); opacity: 0.6; font-weight: 600; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="bg-layer"><div class="bg-orb bg-orb-1"></div><div class="bg-orb bg-orb-2"></div></div>

    <div class="login-container">
        <div class="logo-area">
            <img src="https://iconape.com/wp-content/files/hq/389851/svg/389851.svg" class="logo-img">
            <div class="logo-tag">Strategic Command</div>
        </div>

        <div class="login-card">
            <h1 class="login-title">Command Access</h1>
            <p class="login-subtitle">Authenticate for HR Management Terminal</p>

            <div id="login-error">Invalid credentials</div>

            <div class="input-group">
                <input type="email" id="email" class="login-input" placeholder="Admin Email">
                <i class="fas fa-envelope input-icon"></i>
            </div>

            <div class="input-group">
                <input type="password" id="password" class="login-input" placeholder="Access Code">
                <i class="fas fa-lock input-icon"></i>
            </div>

            <button class="login-btn" id="login-btn" onclick="handleLogin()">
                <span id="btn-text">INITIALIZE TERMINAL</span>
                <div class="spinner" id="btn-spinner"></div>
            </button>
        </div>

        <div class="footer-note">PRIVATE ACCESS • AUTHORIZED ONLY</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyCWW5fJIYSw0p_LGuDJZA-4bOfQ92tdUPM", authDomain: "majed-code1.firebaseapp.com", projectId: "majed-code1", storageBucket: "majed-code1.firebasestorage.app", messagingSenderId: "668474846040", appId: "1:668474846040:web:8ddd1c4818cda34e97d32d", measurementId: "G-HJKQWYHMHZ" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Redirect if already logged in and authorized
        auth.onAuthStateChanged(async user => {
            if (user) {
                const SUPER_ADMIN = 'majedaltaifi1@gmail.com';
                if (user.email.toLowerCase() === SUPER_ADMIN) {
                    window.location.href = 'HR_Portal.html';
                } else {
                    const q = await db.collection('users').where('email', '==', user.email.toLowerCase()).get();
                    if (!q.empty) {
                        window.location.href = 'HR_Portal.html';
                    }
                }
            }
        });

        async function handleLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');
            const text = document.getElementById('btn-text');
            const spinner = document.getElementById('btn-spinner');
            const error = document.getElementById('login-error');

            if (!email || !password) {
                showError("Please enter both email and password.");
                return;
            }

            error.style.display = 'none';
            btn.disabled = true;
            text.style.display = 'none';
            spinner.style.display = 'block';

            try {
                const result = await auth.signInWithEmailAndPassword(email, password);
                const user = result.user;
                
                const SUPER_ADMIN = 'majedaltaifi1@gmail.com';
                if (user.email.toLowerCase() !== SUPER_ADMIN) {
                    const q = await db.collection('users').where('email', '==', user.email.toLowerCase()).get();
                    if (q.empty) {
                        await auth.signOut();
                        showError("Unauthorized Access: This terminal is locked.");
                        resetBtn();
                        return;
                    }
                }
                // Auth listener will handle redirection
            } catch (e) {
                showError(e.message);
                resetBtn();
            }
        }

        function resetBtn() {
            const btn = document.getElementById('login-btn');
            const text = document.getElementById('btn-text');
            const spinner = document.getElementById('btn-spinner');
            btn.disabled = false;
            text.style.display = 'block';
            spinner.style.display = 'none';
        }

        function showError(msg) {
            const error = document.getElementById('login-error');
            error.innerText = msg;
            error.style.display = 'block';
        }
    </script>
</body>
</html>
