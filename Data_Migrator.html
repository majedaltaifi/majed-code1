<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIT Data Migrator | Employee Deployment</title>
    <!-- Premium Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <!-- SheetJS for Excel Processing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { --primary: #0f172a; --accent: #3b82f6; --bg: #020617; --text: #f8fafc; }
        body { margin: 0; background-color: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .migrator-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); padding: 50px; border-radius: 40px; width: 100%; max-width: 600px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .logo { width: 150px; filter: brightness(0) invert(1); margin-bottom: 20px; }
        h1 { font-weight: 900; letter-spacing: -1px; margin-bottom: 10px; }
        p { color: #94a3b8; margin-bottom: 40px; font-size: 0.95rem; }
        .upload-zone { border: 2px dashed rgba(59, 130, 246, 0.3); padding: 40px; border-radius: 20px; cursor: pointer; transition: 0.3s; background: rgba(59, 130, 246, 0.05); position: relative; }
        .upload-zone:hover { border-color: var(--accent); background: rgba(59, 130, 246, 0.1); }
        .upload-zone i { font-size: 3rem; color: var(--accent); margin-bottom: 15px; }
        input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        .progress-container { margin-top: 30px; display: none; }
        .progress-bar { height: 10px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; margin-top: 10px; }
        .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: 0.3s; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .stat { background: rgba(0,0,0,0.2); padding: 20px; border-radius: 15px; }
        .stat-val { font-size: 1.5rem; font-weight: 900; color: var(--accent); }
        .stat-label { font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; margin-top: 5px; }
        .btn { background: var(--accent); color: white; border: none; padding: 15px 40px; border-radius: 15px; font-weight: 700; margin-top: 30px; cursor: pointer; display: none; width: 100%; transition: 0.3s; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(59,130,246,0.3); }
        .log { margin-top: 20px; font-size: 0.75rem; color: #94a3b8; height: 60px; overflow-y: auto; text-align: left; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="migrator-card">
        <img src="https://iconape.com/wp-content/files/hq/389851/svg/389851.svg" class="logo" alt="Nesma IT">
        <h1>Employee Data Migrator</h1>
        <p>Direct upload gateway for NIT Field Personnel Database</p>

        <div class="upload-zone" id="drop-zone">
            <i class="fas fa-cloud-upload-alt"></i>
            <h3>Select Employee Excel Sheet</h3>
            <p style="margin-bottom:0">Accepts .xlsx, .xls</p>
            <input type="file" id="file-input" accept=".xlsx, .xls">
        </div>

        <div class="progress-container" id="progress-area">
            <div style="display: flex; justify-content: space-between; font-size: 0.8rem;">
                <span id="status-text">Analysing file...</span>
                <span id="pct-text">0%</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
            
            <div class="stats">
                <div class="stat">
                    <div class="stat-val" id="count-total">0</div>
                    <div class="stat-label">Total Records</div>
                </div>
                <div class="stat">
                    <div class="stat-val" id="count-success">0</div>
                    <div class="stat-label">Uploaded</div>
                </div>
            </div>

            <div class="log" id="migrator-log">Ready for migration...</div>
            <button class="btn" id="start-btn">CONFIRM & START DEPLOYMENT</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCWW5fJIYSw0p_LGuDJZA-4bOfQ92tdUPM",
            authDomain: "majed-code1.firebaseapp.com",
            projectId: "majed-code1",
            storageBucket: "majed-code1.firebasestorage.app",
            messagingSenderId: "668474846040",
            appId: "1:668474846040:web:8ddd1c4818cda34e97d32d",
            measurementId: "G-HJKQWYHMHZ"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let pendingData = [];
        const fileInput = document.getElementById('file-input');
        const startBtn = document.getElementById('start-btn');
        const log = document.getElementById('migrator-log');

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(!file) return;

            document.getElementById('progress-area').style.display = 'block';
            document.getElementById('drop-zone').style.display = 'none';

            const reader = new FileReader();
            reader.onload = (evt) => {
                const data = evt.target.result;
                const workbook = XLSX.read(data, { type: 'binary' });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(sheet);

                pendingData = rows.map(r => ({
                    branch_code: r['Branch Code'],
                    emp_no: r['Employee Code']?.toString(),
                    name: r['Employee Name - English'],
                    position: r['Position - English'],
                    department: r['Departments - English'],
                    division: r['Division - English'],
                    unit: r['Unit - English'],
                    project: r['Project - English'],
                    site: r['Site - English'],
                    email: r['E-Mail'],
                    phone: r['Mobile']?.toString(),
                    grade: r['Grade - English'],
                    loc_type: r['Location Type - English']
                })).filter(r => r.emp_no);

                document.getElementById('count-total').innerText = pendingData.length;
                document.getElementById('status-text').innerText = 'File Analysis Complete';
                startBtn.style.display = 'block';
                addLog(`Detected ${pendingData.length} valid employee records.`);
            };
            reader.readAsBinaryString(file);
        });

        startBtn.addEventListener('click', async () => {
            startBtn.disabled = true;
            startBtn.innerText = 'MIGRATING DATA...';
            addLog('Starting cloud deployment sequence...');

            let successCount = 0;
            const total = pendingData.length;

            for(let i = 0; i < total; i++) {
                const emp = pendingData[i];
                try {
                    // Use employee code as the document ID for uniqueness
                    await db.collection('employees').doc(emp.emp_no).set({
                        ...emp,
                        updated_at: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    successCount++;
                    
                    const pct = Math.round((i / total) * 100);
                    document.getElementById('progress-fill').style.width = pct + '%';
                    document.getElementById('pct-text').innerText = pct + '%';
                    document.getElementById('count-success').innerText = successCount;
                    
                    if(i % 50 === 0) addLog(`Batch Processed: ${i} / ${total}`);
                } catch(err) {
                    addLog(`Error uploading ${emp.emp_no}: ${err.message}`);
                }
            }

            document.getElementById('progress-fill').style.width = '100%';
            document.getElementById('pct-text').innerText = '100%';
            addLog('MIGRATION COMPLETE. All records deployed to Firestore.');
            startBtn.innerText = 'DEPLOYMENT SUCCESSFUL';
            startBtn.style.background = '#10b981';
        });

        function addLog(msg) {
            const d = new Date();
            const time = d.getHours() + ":" + d.getMinutes() + ":" + d.getSeconds();
            log.innerHTML = `[${time}] ${msg}<br>` + log.innerHTML;
        }
    </script>
</body>
</html>
